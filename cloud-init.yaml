#cloud-config

# Cloudflare Tunnel, Docker, and Ollama Installation for OCI ARM Instance
# This script installs cloudflared (for Zero Trust tunnel), Docker, and Ollama

package_update: true
package_upgrade: true

packages:
  - docker
  - docker-compose
  - git
  - curl
  - wget
  - vim
  - htop

write_files:
  - path: /root/setup-cloudflared.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e

      echo "=== Cloudflare Tunnel (cloudflared) Setup ==="

      # Install cloudflared for ARM64
      cd /tmp
      wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
      mv cloudflared-linux-arm64 /usr/local/bin/cloudflared
      chmod +x /usr/local/bin/cloudflared

      # Verify installation
      /usr/local/bin/cloudflared --version

      echo "=== cloudflared installed successfully ==="
      echo ""
      echo "Next steps (run manually):"
      echo "1. Authenticate: cloudflared tunnel login"
      echo "2. Create tunnel: cloudflared tunnel create oci-tunnel"
      echo "3. Configure tunnel: edit /root/.cloudflared/config.yml"
      echo "4. Route DNS: cloudflared tunnel route dns oci-tunnel <subdomain.yourdomain.com>"
      echo "5. Start tunnel: cloudflared tunnel run oci-tunnel"
      echo ""
      echo "See SETUP_CLOUDFLARE_TUNNEL.md for detailed instructions"

  - path: /root/cloudflared-config-example.yml
    permissions: '0644'
    content: |
      # Example Cloudflare Tunnel Configuration
      # Copy to /root/.cloudflared/config.yml after creating your tunnel

      tunnel: YOUR_TUNNEL_ID
      credentials-file: /root/.cloudflared/YOUR_TUNNEL_ID.json

      ingress:
        # Ollama API
        - hostname: ollama.yourdomain.com
          service: http://localhost:11434

        # SSH access (optional, for emergency access)
        - hostname: ssh.yourdomain.com
          service: ssh://localhost:22

        # Docker services (add as needed)
        # - hostname: app.yourdomain.com
        #   service: http://localhost:8080

        # Catch-all rule (required)
        - service: http_status:404

  - path: /root/setup-docker.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e

      echo "=== Docker Setup ==="

      # Enable and start Docker
      systemctl enable docker
      systemctl start docker

      # Add opc user to docker group
      usermod -aG docker opc

      # Configure Docker to start on boot
      systemctl enable docker.service
      systemctl enable containerd.service

      echo "Docker installed and configured"
      docker --version

  - path: /root/setup-ollama.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e

      echo "=== Ollama Setup (ARM64) ==="

      # Install Ollama for ARM64
      curl -fsSL https://ollama.com/install.sh | sh

      # Create systemd service for Ollama
      cat > /etc/systemd/system/ollama.service << 'EOF'
      [Unit]
      Description=Ollama Service
      After=network-online.target

      [Service]
      ExecStart=/usr/local/bin/ollama serve
      User=opc
      Group=opc
      Restart=always
      RestartSec=3
      Environment="OLLAMA_HOST=0.0.0.0:11434"

      [Install]
      WantedBy=default.target
      EOF

      # Enable and start Ollama
      systemctl daemon-reload
      systemctl enable ollama
      systemctl start ollama

      echo "Ollama installed and running on port 11434"
      echo "Test with: curl http://localhost:11434/api/version"
      echo ""
      echo "To pull a model: ollama pull llama3.2:1b"
      echo "Recommended small models for ARM:"
      echo "  - llama3.2:1b (1.3GB)"
      echo "  - llama3.2:3b (2GB)"
      echo "  - phi3:mini (2.3GB)"
      echo "  - gemma2:2b (1.6GB)"

runcmd:
  - /root/setup-cloudflared.sh
  - /root/setup-docker.sh
  - /root/setup-ollama.sh

final_message: "System setup complete. Cloudflared, Docker, and Ollama are ready after $UPTIME seconds"